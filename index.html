<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <title>🥕 running brie </title>
    <link rel="stylesheet" href="css/style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body onload="trocarView('home')">

<div id="ui-layer">
    <div id="home" class="view">
        <div class="card">
            <h1>small Brie, big jumps</h1>
            <div class="links">
                <a href="brie.html" class="link-btn">PLAY</a>
                <button onclick="trocarView('controls')" class="link-btn">CONTROLS</button>
                <a href="https://github.com/jessicroche/jumping-brie" class="link-btn" target="_blank">GITHUB PAGE</a>

            </div>
        </div>
    </div>

    <div id="controls" class="view">
        <div class="card">
            <h1>CONTROLS</h1>
            <p class="bio" style="text-align: left;">
                <strong>JUMP</strong> - [ W ] [ ↑ ] [ SPACE ] <br>
                <strong>CROUCH</strong> - [ S ] [ ↓ ] [ SHIFT ] <br>
            </p>
            <button onclick="trocarView('home')" class="link-btn">Back</button>
        </div>
    </div>
</div>

<div id="ThreeJS"></div>

<script src="js/Three.js"></script>
<script src="js/Detector.js"></script>
<script src="js/ui.js"></script>
<script src="js/brie.js"></script>
<script src="js/cenario.js"></script>
<script src="js/game.js"></script>

</body>
</html>
